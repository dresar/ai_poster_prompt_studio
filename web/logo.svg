<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Transparent background -->
  <rect width="512" height="512" fill="none" />
  
  <!-- Outer Neobrutalist Shadow -->
  <rect x="74" y="94" width="364" height="344" rx="32" fill="#0A0A0A" />
  
  <!-- Main Neobrutalist Card -->
  <rect x="64" y="84" width="364" height="344" rx="32" fill="#FFFEFA" stroke="#0A0A0A" stroke-width="10" />
  
  <!-- Sparkles/Stars to show AI power (top right) -->
  <path d="M370,120 L375,135 L390,140 L375,145 L370,160 L365,145 L350,140 L365,135 Z" fill="#FFD03C" stroke="#0A0A0A" stroke-width="3" />
  
  <!-- Clean minimalist terminal prompt & canvas symbol combined -->
  <g transform="translate(136, 136)">
    <!-- Terminal Prompt Symbol (Large >_) -->
    <path d="M40,60 L110,110 L40,160" fill="none" stroke="#0A0A0A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="130" y1="160" x2="200" y2="160" stroke="#0A0A0A" stroke-width="14" stroke-linecap="round" />
    
    <!-- Neon green/cyan brush stroke to symbolize "studio" creation -->
    <path d="M70,195 C120,205 180,185 200,140 C210,120 180,90 140,80" fill="none" stroke="#00D28A" stroke-width="10" stroke-linecap="round" />
    
    <!-- Neon Pink paint drop -->
    <circle cx="210" cy="70" r="16" fill="#FF5E97" stroke="#0A0A0A" stroke-width="4" />
  </g>
</svg>
